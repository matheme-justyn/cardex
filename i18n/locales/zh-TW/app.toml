[tutorial]
title = "🎓 Cardex 使用教學"
welcome = "歡迎使用 Cardex"
welcome_desc = "Cardex 是一個學術文獻管理系統，幫助您管理和整理 PDF 文獻。"

[tutorial.quick_start]
title = "🚀 快速開始"
step1_title = "1️⃣ 設定圖書館路徑"
step1_desc = "在左側邊欄選擇您的 PDF 存放資料夾。您可以使用快速選擇按鈕或手動輸入路徑。"
step2_title = "2️⃣ 準備預設資料夾"
step2_desc = "在「圖書館」分頁上方會看到狀態卡片。如果顯示「未啟動」，點擊「準備預設資料夾」按鈕，系統會自動建立 _input 資料夾。"
step3_title = "3️⃣ 放入 PDF 並瀏覽"
step3_desc = "將新 PDF 檔案放入 _input 資料夾，然後在下方查看所有掃描到的文獻。"

[tutorial.features]
title = "✨ 主要功能"
library_title = "📁 圖書館管理"
library_desc = "- **快速選擇**：使用預設、桌面、文件、下載資料夾快速切換\n- **遞迴掃描**：自動掃描子資料夾中的 PDF\n- **相對路徑顯示**：清楚看到檔案在圖書館中的位置"
search_title = "🔍 檔案搜尋"
search_desc = "依檔名快速過濾 PDF 清單，支援即時搜尋。"
stats_title = "📊 統計資訊"
stats_desc = "查看圖書館的 PDF 總數、可讀取數量、總大小等資訊。"

[tutorial.quick_buttons]
title = "⭐ 快速選擇按鈕說明"
default_title = "⭐ 預設"
default_desc = "切換到您在配置檔中設定的預設圖書館路徑。"
desktop_title = "🖥️ 桌面"
desktop_desc = "快速切換到桌面資料夾。"
documents_title = "📝 文件"
documents_desc = "快速切換到文件資料夾（通常用於存放正式文獻）。"
downloads_title = "📥 下載"
downloads_desc = "快速切換到下載資料夾（查看最近下載的 PDF）。"

[tutorial.tips]
title = "💡 使用技巧"
tip1_title = "📝 讓 AI 幫你設定"
tip1_desc = "不需要手動編輯配置檔！複製下方指令給你的 AI 助手（Claude、ChatGPT、Cursor 等），讓它幫你設定："
tip1_prompt = """請幫我設定 Cardex 的預設圖書館路徑：

1. 編輯 ~/.cardex/config.yaml
2. 將 library.default_path 設定為：[你的常用資料夾路徑]
3. 確認 recursive_scan 設為 true（自動掃描子資料夾）

範例路徑：
- macOS: ~/Documents/papers 或 ~/Library/CloudStorage/Dropbox/research
- Windows: C:\\Users\\YourName\\Documents\\papers
- Linux: ~/documents/research

設定完成後顯示配置檔內容讓我確認。"""
tip2_title = "📂 組織你的 PDF"
tip2_desc = "我們建議使用子資料夾分類文獻，並啟用遞迴掃描。如果需要幫助，複製這段給 AI："
tip2_prompt = """我想整理 PDF 文獻庫，請給我一個資料夾結構建議，考慮：

1. 按年份分類（例如：2024/、2023/）
2. 按主題或領域分類（例如：AI/、Security/、HCI/）
3. 經典必讀的獨立資料夾
4. 待讀清單資料夾

請給我一個樹狀結構範例，並說明如何使用。"""
tip3_title = "🎨 快速客製化"
tip3_desc = "想要調整語言、主題或其他設定？直接在左側 sidebar 切換即可，變更會立即生效。"

