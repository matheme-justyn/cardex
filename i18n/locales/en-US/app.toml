welcome_desc = "Cardex is an academic literature management system that helps you manage and organize PDF documents."

[tutorial.quick_start]
title = "🚀 Quick Start"
step1_title = "1️⃣ Set Library Path"
step1_desc = "Select your PDF storage folder in the left sidebar. You can use quick select buttons or enter the path manually."
step2_title = "2️⃣ Browse PDFs"
step2_desc = "Switch back to the 'Library' tab to view all scanned PDF files."
step3_title = "3️⃣ Search Files"
step3_desc = "Use the search box to quickly find the documents you need."

[tutorial.features]
title = "✨ Key Features"
library_title = "📁 Library Management"
library_desc = "- **Quick Select**: Quickly switch between Default, Desktop, Documents, and Downloads folders\n- **Recursive Scan**: Automatically scan PDFs in subfolders\n- **Relative Path Display**: Clearly see file locations within your library"
search_title = "🔍 File Search"
search_desc = "Filter PDF list by filename with instant search support."
stats_title = "📊 Statistics"
stats_desc = "View library statistics including total PDFs, readable count, and total size."

[tutorial.quick_buttons]
title = "⭐ Quick Select Buttons"
default_title = "⭐ Default"
default_desc = "Switch to the default library path set in your config file."
desktop_title = "🖥️ Desktop"
desktop_desc = "Quickly switch to your Desktop folder."
documents_title = "📝 Documents"
documents_desc = "Quickly switch to Documents folder (usually for formal documents)."
downloads_title = "📥 Downloads"
downloads_desc = "Quickly switch to Downloads folder (check recently downloaded PDFs)."

[tutorial.tips]
title = "💡 Usage Tips"
tip1_title = "📝 Let AI Configure for You"
tip1_desc = "No need to manually edit config files! Copy the prompt below and give it to your AI assistant (Claude, ChatGPT, Cursor, etc.):"
tip1_prompt = """Please help me configure Cardex's default library path:

1. Edit ~/.cardex/config.yaml
2. Set library.default_path to: [your common folder path]
3. Ensure recursive_scan is set to true (auto-scan subfolders)

Example paths:
- macOS: ~/Documents/papers or ~/Library/CloudStorage/Dropbox/research
- Windows: C:\\\\Users\\\\YourName\\\\Documents\\\\papers
- Linux: ~/documents/research

Show me the config file content after setup for confirmation."""
tip2_title = "📂 Organize Your PDFs"
tip2_desc = "We recommend using subfolders to categorize documents with recursive scan enabled. Need help? Copy this to AI:"
tip2_prompt = """I want to organize my PDF library. Please suggest a folder structure considering:

1. Organize by year (e.g., 2024/, 2023/)
2. Organize by topic or field (e.g., AI/, Security/, HCI/)
3. Separate folder for must-read classics
4. To-read list folder

Please provide a tree structure example and explain how to use it."""
tip3_title = "🎨 Quick Customization"
tip3_desc = "Want to adjust language, theme, or other settings? Simply switch in the left sidebar - changes take effect immediately."

